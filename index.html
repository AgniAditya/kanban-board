<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="modal">
            <button type="button" class="close-btn"><h1>&times;</h1></button>
            <form class="new-task" autocomplete="off">
                <div class="task-name">
                    <input id="task-name" name="taskName" type="text" placeholder="Task name" required>
                </div>

                <div class="task-details">
                    <input id="task-details" name="taskDetails" type="text" placeholder="Task details">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-add">Add</button>
                </div>
            </form>
        </div>
        <section>
            <div class="section-header">
                <h1>Kanban Board</h1>
                <button class="new-task-btn"><h3>Add +</h3></button>
            </div>

            <div class="stages">
                <div  id="todo-stage" class="stage">
                    <div class="stage-header">
                        <h3>To Do</h3>
                        <h4><span>0</span></h4>
                    </div>
                    <div class="tasks"></div>
                </div>

                <div id="inprogress-stage" class="stage">
                    <div class="stage-header">
                        <h3>In Progress</h3>
                        <h4><span>0</span></h4>
                    </div>
                    <div class="tasks"></div>
                </div>

                <div id="completed-stage" class="stage">
                    <div class="stage-header">
                        <h3>Done</h3>
                        <h4><span>0</span></h4>
                    </div>
                    <div class="tasks"></div>
                </div>

            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
