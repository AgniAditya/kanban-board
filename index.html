<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="section-header">
                <h1>Kanban Board</h1>
                <button class="add-task-btn"><h3>Add +</h3></button>
            </div>
            <div class="stages">
                <div class="stage">
                    <div class="stage-header">
                        <h3>To Do</h3>
                        <h4>1</h4>
                    </div>
                    <div class="tasks">
                        <div class="task">
                            <div class="details">
                                <h4>Learn JS</h4>
                                <p>finish it today</p>
                            </div>
                            <div class="delete-task">
                                <button class="delete-task-btn"><h5>Delete</h5></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="stage">
                    <div class="stage-header">
                        <h3>In Progess</h3>
                        <h4>1</h4>
                    </div>
                    <div class="tasks">
                        <div class="task">
                            <div class="details">
                                <h4>DSA</h4>
                                <p>solve 3 DSA problems</p>
                            </div>
                            <div class="delete-task">
                                <button class="delete-task-btn"><h5>Delete</h5></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="stage">
                    <div class="stage-header">
                        <h3>Done</h3>
                        <h4>1</h4>
                    </div>
                    <div class="tasks">
                        <div class="task">
                            <div class="details">
                                <h4>GYM</h4>
                                <p>legs and abs</p>
                            </div>
                            <div class="delete-task">
                                <button class="delete-task-btn"><h5>Delete</h5></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
